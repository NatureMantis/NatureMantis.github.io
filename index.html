<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gento-simul</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <aside id="inputContainer">
        <p id="equation">p2+2pq+q2</p>
        <section id="geneInputContainer">
            <p class="geneInputTxt" class="geneITOP">B =</p>
            <input type="number" id="homoDinput" class="geneInput" value="0">
            <p class="geneInputTxt">b =</p>
            <input type="number" id="homoRinput" class="geneInput" value="0">
        </section>
        <button class="geneButton" id="checkButton">Check</button>
        <button class="geneButton" id="formatButton">Format</button>
        <section id="colorInputContainer">
            <p class="geneInputTxt">BB =</p>
            <input type="color" value="#00EE00" id="homoDcolor" class="geneInput">
            <p class="geneInputTxt">Bb =</p>
            <input type="color" value="#EE0000" id="heteroColor" class="geneInput">
            <p class="geneInputTxt">bb =</p>
            <input type="color" value="#0000EE" id="homoRcolor" class="geneInput">
        </section>
        <section id="bottomSection">
                <button id="settingOpen">Settings & Information</button>
                <section id="hiddenSettings">
                    <button id="doMovement">Stop Movement</button>
                    <p>Dark Mode</p>
                    <input type="checkbox">
                    <p id="HMDdisplay">HMD: %</p>
                    <p id="HMRdisplay">HMR: %</p>
                    <p id="HTdisplay">HT: %</p>
                </section>
        </section>
    </aside>
    <section id="simulationContainer">
    </section>
</body>
<script src="base.js"></script>
</html>
