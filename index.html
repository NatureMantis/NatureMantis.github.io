<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hardy Weinburg SImulation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <aside id="inputContainer">
        <header>
            <h1 id="title">Hardy Weinburg Simulation</h1>
            <p id="equation">p<sup>2</sup> + 2pq + q<sup>2</sup> = 1</p>
        </header>

        <section class="control-card">
            <label class="section-label">Allele Frequency</label>
            <div id="geneInputContainer">
                <div class="input-wrapper">
                    <span class="geneInputTxt">B</span>
                    <input type="number" id="homoDinput" class="geneInput" value="0">
                </div>
                <div class="input-wrapper">
                    <span class="geneInputTxt">b</span>
                    <input type="number" id="homoRinput" class="geneInput" value="0">
                </div>
            </div>
            <div class="action-buttons">
                <button class="geneButton" id="checkButton">Check</button>
                <button class="geneButton" id="formatButton">Format</button>
            </div>
        </section>

        <section class="control-card">
            <label class="section-label">Phenotype Visualization</label>
            <div id="colorInputContainer">
                <div class="color-wrapper">
                    <span class="geneInputTxt">BB</span>
                    <input type="color" value="#00EE00" id="homoDcolor" class="geneInput">
                </div>
                <div class="color-wrapper">
                    <span class="geneInputTxt">Bb</span>
                    <input type="color" value="#EE0000" id="heteroColor" class="geneInput">
                </div>
                <div class="color-wrapper">
                    <span class="geneInputTxt">bb</span>
                    <input type="color" value="#0000EE" id="homoRcolor" class="geneInput">
                </div>
            </div>
        </section>

        <section id="bottomSection">
            <button id="settingOpen">Settings & Info</button>
            <section id="hiddenSettings">
                <label class="section-label">Simulation Controls</label>
                <button id="doMovement">Stop/Start Movement</button>
                <div class="setting-row">
                    <span>Dark Mode</span>
                    <input type="checkbox">
                </div>
                <div class="stats-box">
                    <p id="HMDdisplay">Homozygous Dominant: --%</p>
                    <p id="HTdisplay">Heterozygous: --%</p>
                    <p id="HMRdisplay">Homozygous Recessive: --%</p>
                </div>
            </section>
        </section>
    </aside>

    <section id="simulationContainer">
        </section>
</body>
<script src="base.js"></script>
</html>
